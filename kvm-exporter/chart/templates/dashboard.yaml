{{- if .Values.persesDashboards.create }}
{{ $root := . }}
{{- range $path, $bytes := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" $root.Release.Name ($path | replace ".json" "" | replace "/" "-" | trunc 63) }}
  labels:
{{- include "kvm-operations.persesDashboardSelectorLabels" (list $path $root) | indent 4 }} 
{{ include "kvm-operations.labels" (list $path $root) | indent 4 }}
data:     
{{ printf "%s: |-" ($path | replace "/" "-" | indent 2) }}
{{ printf "%s" $bytes | indent 4 }}
{{- end }}
{{- end }}

{{- if .Values.dashboards.global.create }}
{{ $root := . }}
{{- range $path, $bytes := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" $root.Release.Name ($path | replace ".json" "" | replace "/" "-" | trunc 63) }}
  labels:
{{- include "kvm-operations.persesGlobalDashboardSelectorLabels" (list $path $root) | indent 4 }} 
{{ include "kvm-operations.labels" (list $path $root) | indent 4 }}
data:     
{{ printf "%s: |-" ($path | replace "/" "-" | indent 2) }}
{{ printf "%s" $bytes | indent 4 }}
{{- end }}
{{- end }}
