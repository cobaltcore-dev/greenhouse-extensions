apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kvm-exporter.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "kvm-exporter.fullname" . }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  template:
    metadata:
      labels:
        app: {{ include "kvm-exporter.fullname" . }}
    spec:
      {{- $libvirtConf := .Values.libvirt.configPath | default "/etc/libvirt/libvirt.conf" }}
      hostPID: true
      hostNetwork: true
      serviceAccountName: {{ include "kvm-exporter.fullname" . }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
      containers:
        - name: monitoring
          image: "{{ .Values.image.repository }}:{{ required "image.tag must be set" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/monitoring"]
          args: ["--health-probe-bind-address=:8080"]
          ports:
            - name: metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          env:
            - name: LIBVIRT_URI
              value: "{{ .Values.libvirt.uri }}"
            - name: EXTERNAL_MOUNT_PATHS
              value: "{{ join "," .Values.libvirt.mountPaths }}"
            - name: CLOUDHYPERVISOR_SOCKET_PATH
              value: "{{ .Values.libvirt.socketPath }}"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          securityContext:
            privileged: {{ .Values.securityContext.privileged }}
            procMount: {{ .Values.securityContext.procMount }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              {{- with .Values.securityContext.dropCapabilities }}
              drop:
              {{- range . }}
                - {{ . }}
              {{- end }}
              {{- end }}
              {{- with .Values.securityContext.addCapabilities }}
              add:
              {{- range . }}
                - {{ . }}
              {{- end }}
              {{- end }}
            seccompProfile:
              type: {{ .Values.securityContext.seccompProfile.type }}
            appArmorProfile:
              type: {{ .Values.securityContext.appArmorProfile.type }}
          volumeMounts:
            - name: libvirt-run
              mountPath: /run/libvirt
              readOnly: true
            - name: sys-fs-cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: libvirt-conf
              mountPath: {{ $libvirtConf }}
              readOnly: true
            {{- range $i, $p := .Values.libvirt.mountPaths }}
            - name: nova-mnt-{{ $i }}
              mountPath: {{ $p }}
              readOnly: true
            {{- end }}
      volumes:
        - name: sys-fs-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: libvirt-run
          hostPath:
            path: /run/libvirt
            type: Directory
        - name: libvirt-conf
          hostPath:
            path: {{ $libvirtConf }}
            type: File
        {{- range $i, $p := .Values.libvirt.mountPaths }}
        - name: nova-mnt-{{ $i }}
          hostPath:
            path: {{ $p }}
            type: Directory
        {{- end }}
