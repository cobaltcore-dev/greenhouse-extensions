name: Auto Version Bump

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'kvm-exporter/chart/**'
      - 'kvm-exporter/plugindefinition.yaml'
      - 'kvm-node-agent/chart/**'
      - 'kvm-node-agent/plugindefinition.yaml'
      - 'labels-injector/chart/**'
      - 'labels-injector/plugindefinition.yaml'
      - 'openstack-hypervisor-operator/chart/**'
      - 'openstack-hypervisor-operator/plugindefinition.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - folder: kvm-exporter
          - folder: kvm-node-agent
          - folder: labels-injector
          - folder: openstack-hypervisor-operator

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.x'
          check-latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          YQ_VERSION=v4.44.3
          curl -L "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@e0021407031f5be11a464abee9a0776171c79891 # v47.0.1
        with:
          files: |
            ${{ matrix.folder }}/chart/**
            ${{ matrix.folder }}/plugindefinition.yaml

      - name: Determine bump type and update versions
        id: version-bump
        if: steps.changed-files.outputs.all_changed_files != ''
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "Changed files: $ALL_CHANGED_FILES"
          
          # Check if plugindefinition.yaml exists
          if [ ! -f "${{ matrix.folder }}/plugindefinition.yaml" ]; then
            echo "No plugindefinition.yaml found for ${{ matrix.folder }}"
            exit 0
          fi
          
          # Check if version was already bumped in this PR
          if git log --oneline origin/${{ github.base_ref }}..${{ github.head_ref }} | grep -q "chore(${{ matrix.folder }}): bump version"; then
            echo "Version already bumped in this PR - skipping"
            exit 0
          fi
          
          # Get current version
          currentVersion=$(yq .spec.version "${{ matrix.folder }}/plugindefinition.yaml")
          echo "Current version: $currentVersion"
          
          # Determine bump type based on changed files
          bumpType="patch"
          if echo "$ALL_CHANGED_FILES" | grep -q "${{ matrix.folder }}/chart/"; then
            bumpType="minor"
            echo "Chart files changed - performing minor bump"
          else
            echo "Only plugindefinition.yaml changed - performing patch bump"
          fi
          
          # Parse version
          IFS='.' read -r major minor patch <<< "$currentVersion"
          
          # Bump version
          if [ "$bumpType" = "minor" ]; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi
          
          newVersion="${major}.${minor}.${patch}"
          echo "New version: $newVersion"
          echo "new_version=$newVersion" >> "$GITHUB_OUTPUT"
          
          # Update plugindefinition.yaml
          yq -i ".spec.version = \"$newVersion\"" "${{ matrix.folder }}/plugindefinition.yaml"
          yq -i ".spec.helmChart.version = \"$newVersion\"" "${{ matrix.folder }}/plugindefinition.yaml"
          
          # Update Chart.yaml if it exists
          if [ -f "${{ matrix.folder }}/chart/Chart.yaml" ]; then
            echo "Updating Chart.yaml version"
            yq -i ".version = \"$newVersion\"" "${{ matrix.folder }}/chart/Chart.yaml"
          fi
          
          echo "Version bump complete: $currentVersion -> $newVersion"

      - name: Sync appVersion from image tag
        if: steps.version-bump.outputs.new_version != ''
        run: |
          if [ -f "${{ matrix.folder }}/chart/values.yaml" ] && [ -f "${{ matrix.folder }}/chart/Chart.yaml" ]; then
            IMAGE_TAG=$(yq .${{ matrix.folder }}.image.tag "${{ matrix.folder }}/chart/values.yaml")
            if [ -n "$IMAGE_TAG" ]; then
              echo "Syncing appVersion to: $IMAGE_TAG"
              yq -i ".appVersion = \"$IMAGE_TAG\"" "${{ matrix.folder }}/chart/Chart.yaml"
            fi
          fi

      - name: Commit version changes
        if: steps.version-bump.outputs.new_version != ''
        run: |
          git add ${{ matrix.folder }}/plugindefinition.yaml
          if [ -f "${{ matrix.folder }}/chart/Chart.yaml" ]; then
            git add ${{ matrix.folder }}/chart/Chart.yaml
          fi
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(${{ matrix.folder }}): bump version to ${{ steps.version-bump.outputs.new_version }}"
            git push origin ${{ github.head_ref }}
          fi
