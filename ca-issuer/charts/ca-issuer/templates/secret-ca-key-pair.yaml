apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-ca-key-pair
  labels:
    system: openstack
    type: configuration
    component: nova
data:
  tls.crt: {{ .Values.libvirt.ca.cert | required "value libvirt.ca.cert is required" | b64enc }}
  tls.key: {{ .Values.libvirt.ca.key | required "value libvirt.ca.key is required" | b64enc }}